<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">From Door Knocking to Signal Mapping</title>
  <desc id="desc">A retro-modern Bitplus Signal infographic connecting ethical door-to-door fieldcraft to public internet signal mapping for BTC++ Toronto.</desc>
  <defs>
    <style>
      .bg { fill: #f7efd9; }
      .ink { fill: #1f211c; }
      .muted { fill: #6f6a58; }
      .teal { fill: #2e6f72; }
      .teal-line { stroke: #2e6f72; }
      .red { fill: #b94d3e; }
      .gold { fill: #e8b942; }
      .cream { fill: #fffaf0; }
      .blue { fill: #21749a; }
      .line { stroke: #1f211c; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .thin { stroke: #1f211c; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .panel { fill: #fffaf0; stroke: #1f211c; stroke-width: 4; rx: 16; }
      .chip { fill: #efe0bb; stroke: #1f211c; stroke-width: 2; rx: 16; }
      .title { font: 800 68px Georgia, "Times New Roman", serif; letter-spacing: 0; }
      .subtitle { font: 700 24px Arial, sans-serif; letter-spacing: .5px; }
      .h2 { font: 800 30px Arial, sans-serif; letter-spacing: .4px; }
      .body { font: 600 21px Arial, sans-serif; }
      .small { font: 700 17px Arial, sans-serif; }
      .tiny { font: 700 14px Arial, sans-serif; }
      .mono { font: 700 18px "Courier New", monospace; }
    </style>
    <pattern id="paper" width="18" height="18" patternUnits="userSpaceOnUse">
      <rect width="18" height="18" fill="#f7efd9"/>
      <circle cx="4" cy="5" r="1" fill="#e6d6ad" opacity=".45"/>
      <circle cx="14" cy="12" r="1" fill="#e6d6ad" opacity=".35"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b94d3e"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#paper)"/>
  <rect x="30" y="30" width="1540" height="840" rx="28" fill="none" stroke="#1f211c" stroke-width="6"/>
  <rect x="48" y="48" width="1504" height="804" rx="20" fill="none" stroke="#e8b942" stroke-width="5"/>

  <text x="92" y="118" class="title ink">From Door Knocking to Signal Mapping</text>
  <text x="96" y="158" class="subtitle muted">Ethical outreach intelligence for builder conferences</text>
  <g transform="translate(1262 74)">
    <rect x="0" y="0" width="210" height="64" rx="14" class="teal"/>
    <text x="105" y="40" text-anchor="middle" fill="#fffaf0" class="subtitle">BTC++ Toronto</text>
  </g>

  <g transform="translate(86 214)">
    <rect width="360" height="480" class="panel"/>
    <text x="28" y="50" class="h2 ink">Old Route Book</text>
    <text x="28" y="83" class="body muted">1940s-1970s fieldcraft</text>
    <rect x="28" y="118" width="160" height="222" rx="10" fill="#f2dca8" stroke="#1f211c" stroke-width="3"/>
    <line x1="54" y1="156" x2="162" y2="156" class="thin"/>
    <line x1="54" y1="190" x2="162" y2="190" class="thin"/>
    <line x1="54" y1="224" x2="162" y2="224" class="thin"/>
    <line x1="54" y1="258" x2="162" y2="258" class="thin"/>
    <circle cx="230" cy="172" r="26" class="gold" stroke="#1f211c" stroke-width="3"/>
    <path d="M230 199 L230 292 M198 234 L262 234 M230 292 L204 334 M230 292 L260 334" class="line"/>
    <rect x="276" y="130" width="48" height="168" fill="#7b4d2f" stroke="#1f211c" stroke-width="3"/>
    <circle cx="315" cy="214" r="4" class="gold"/>
    <path d="M276 130 L324 130 L300 92 z" fill="#b94d3e" stroke="#1f211c" stroke-width="3"/>
    <text x="28" y="382" class="body ink">Useful pattern:</text>
    <text x="28" y="416" class="small muted">route discipline, trust,</text>
    <text x="28" y="442" class="small muted">proof, local memory.</text>
  </g>

  <g transform="translate(506 214)">
    <rect width="270" height="212" class="panel"/>
    <text x="24" y="42" class="h2 ink">Trust, Not Pressure</text>
    <g transform="translate(24 74)">
      <rect width="218" height="30" class="chip"/>
      <text x="14" y="21" class="tiny ink">Fuller Brush: give first</text>
    </g>
    <g transform="translate(24 112)">
      <rect width="218" height="30" class="chip"/>
      <text x="14" y="21" class="tiny ink">Avon: neighbor trust</text>
    </g>
    <g transform="translate(24 150)">
      <rect width="218" height="30" class="chip"/>
      <text x="14" y="21" class="tiny ink">Kirby: prove it</text>
    </g>
  </g>

  <g transform="translate(506 472)">
    <rect width="270" height="222" class="panel"/>
    <text x="24" y="42" class="h2 ink">Public Internet Route</text>
    <text x="24" y="78" class="small muted">Scan public sources only:</text>
    <text x="24" y="112" class="mono ink">X  Reddit  LinkedIn</text>
    <text x="24" y="144" class="mono ink">Instagram  TikTok</text>
    <text x="24" y="176" class="mono ink">Facebook  Nostr</text>
    <text x="24" y="206" class="small teal">events + communities</text>
  </g>

  <path d="M802 445 C880 420, 908 420, 990 445" stroke="#b94d3e" stroke-width="10" fill="none" marker-end="url(#arrow)"/>
  <text x="854" y="398" class="small red">modernize the fieldcraft</text>

  <g transform="translate(1010 214)">
    <rect width="500" height="480" class="panel"/>
    <text x="28" y="50" class="h2 ink">Bitplus Signal Console</text>
    <text x="28" y="82" class="body muted">What should I look at next?</text>

    <g transform="translate(28 120)">
      <rect width="444" height="86" rx="12" fill="#f7efd9" stroke="#1f211c" stroke-width="3"/>
      <rect x="18" y="18" width="58" height="50" rx="8" class="red"/>
      <text x="47" y="51" text-anchor="middle" fill="#fffaf0" class="h2">94</text>
      <text x="94" y="35" class="small ink">Top Opportunity</text>
      <text x="94" y="62" class="tiny muted">public post + provenance + draft</text>
    </g>

    <g transform="translate(28 224)">
      <rect width="444" height="86" rx="12" fill="#f7efd9" stroke="#1f211c" stroke-width="3"/>
      <rect x="18" y="18" width="58" height="50" rx="8" class="teal"/>
      <text x="47" y="51" text-anchor="middle" fill="#fffaf0" class="h2">90</text>
      <text x="94" y="35" class="small ink">Event Context</text>
      <text x="94" y="62" class="tiny muted">nearby builder rooms and communities</text>
    </g>

    <g transform="translate(28 328)">
      <rect width="444" height="86" rx="12" fill="#f7efd9" stroke="#1f211c" stroke-width="3"/>
      <rect x="18" y="18" width="58" height="50" rx="8" class="gold"/>
      <text x="47" y="51" text-anchor="middle" class="h2 ink">?</text>
      <text x="94" y="35" class="small ink">Human Review</text>
      <text x="94" y="62" class="tiny muted">approve, ignore, or refine before reply</text>
    </g>
  </g>

  <g transform="translate(86 730)">
    <rect width="1424" height="92" rx="18" fill="#1f211c"/>
    <text x="32" y="38" fill="#fffaf0" class="h2">Safety Rails</text>
    <g transform="translate(250 22)">
      <rect width="130" height="46" rx="23" fill="#b94d3e"/>
      <text x="65" y="30" text-anchor="middle" fill="#fffaf0" class="small">No DMs</text>
    </g>
    <g transform="translate(405 22)">
      <rect width="196" height="46" rx="23" fill="#b94d3e"/>
      <text x="98" y="30" text-anchor="middle" fill="#fffaf0" class="small">No private groups</text>
    </g>
    <g transform="translate(626 22)">
      <rect width="214" height="46" rx="23" fill="#b94d3e"/>
      <text x="107" y="30" text-anchor="middle" fill="#fffaf0" class="small">No harvested contacts</text>
    </g>
    <g transform="translate(866 22)">
      <rect width="174" height="46" rx="23" fill="#b94d3e"/>
      <text x="87" y="30" text-anchor="middle" fill="#fffaf0" class="small">No manipulation</text>
    </g>
    <text x="1080" y="38" fill="#e8b942" class="small">Public provenance.</text>
    <text x="1080" y="64" fill="#e8b942" class="small">Human approval.</text>
  </g>

  <g transform="translate(820 520)">
    <circle cx="0" cy="0" r="10" class="blue"/>
    <path d="M0 0 C42 -50, 90 -58, 138 -36 M0 0 C46 30, 88 36, 138 18 M138 -36 L190 -80 M138 18 L190 66" stroke="#21749a" stroke-width="5" fill="none" stroke-linecap="round"/>
    <circle cx="190" cy="-80" r="12" class="blue"/>
    <circle cx="190" cy="66" r="12" class="blue"/>
  </g>

  <text x="96" y="850" class="small muted">Bitplus Signal turns scattered public intent into a short review queue for BTC++ Toronto.</text>
</svg>
